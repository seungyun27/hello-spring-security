<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
    </div>

    <div class="card form-card">
        <div class="card-body p-4">
            <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">현재 비밀번호</label>
                    <input type="password" th:field="*{currentPassword}" class="form-control" required/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">새 비밀번호 (8자 이상)</label>
                    <input type="password" th:field="*{newPassword}" class="form-control" required/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">새 비밀번호 확인</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-control" required/>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-50 fw-semibold">변경하기</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary w-50 fw-semibold text-center">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 text-center border-top">
    <p>실습 수행 일시: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
        | 학번: 2291073 | 성명: 김승윤</p>
</footer>
</body>
</html>
